services:
  app:
    image: '${IMAGE_URI:?IMAGE_URI is required}'
    env_file:
      - production.env
    ports:
      - '80:80'
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://127.0.0.1/up || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
