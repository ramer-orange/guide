name: Deploy # ワークフローの名前（GitHub Actions画面に表示される）

on: # トリガー条件の定義
  push: # pushイベントで起動
    branches:
      - main # mainブランチへのpushのみ対象

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_DEPLOY_PAUSED: 'true'

jobs: # 実行するジョブの一覧

  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: guide_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d guide_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: PHPセットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_pgsql

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: アプリ検証
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npm run build
          APP_KEY=base64:54QOuuDvHgF5PcqsqkwmaUGE6vtM28BKGPFItCUxCsk= DB_CONNECTION=pgsql DB_HOST=127.0.0.1 DB_PORT=5432 DB_DATABASE=guide_test DB_USERNAME=postgres DB_PASSWORD=postgres php artisan test

      - name: CDK検証
        run: |
          cd infra
          npm ci
          npm test -- --runInBand
          npm run build

  changes: # どのファイルが変更されたかを判定するジョブ
    runs-on: ubuntu-latest # GitHubが提供するUbuntu環境で実行
    outputs:
      infra: ${{ steps.filter.outputs.infra }} # infra/に変更があったかどうかを後続ジョブに渡す
    steps:
      - uses: actions/checkout@v4 # リポジトリのコードをチェックアウト（ファイル変更の検知に必要）
      - uses: dorny/paths-filter@v3 # 変更されたファイルのパスでフィルタリングするアクション
        id: filter # このステップをfilterという名前で参照できるようにする
        with:
          filters: | # フィルタのルールを定義
            infra: # "infra"というフィルタ名
              - 'infra/**' # infra/以下のファイルが変更された場合にtrueになる

  deploy-infra: # CDK（インフラ）をデプロイするジョブ
    runs-on: ubuntu-latest
    needs: [changes, validate] # 変更検知と検証が完了してから実行する
    if: env.AWS_DEPLOY_PAUSED != 'true' && needs.changes.outputs.infra == 'true' # infra/に変更があった場合のみ実行（それ以外はスキップ）

    steps:
      - uses: actions/checkout@v4 # リポジトリのコードをチェックアウト

      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4 # AWS公式の認証アクション
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }} # GitHub OIDCでAssumeするIAM Role
          aws-region: ${{ secrets.AWS_REGION }} # GitHub Secretsからリージョンを取得（ap-northeast-1）

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4 # Node.jsをインストールするアクション（CDKの実行に必要）
        with:
          node-version: '20' # Node.js 20を使用
          cache: 'npm' # node_modulesをキャッシュして次回の実行を高速化
          cache-dependency-path: infra/package-lock.json # キャッシュのキーとして使うファイル

      - name: 依存パッケージインストール
        run: cd infra && npm ci # package-lock.jsonに基づいて正確にインストール（npm installより厳格）

      - name: CDK差分確認（ログのみ）
        run: cd infra && npx cdk diff # 現在のAWS環境との差分をログに出力（適用はしない）

      - name: CDKデプロイ
        run: cd infra && npx cdk deploy --require-approval never # 承認プロンプトなしでCDKをデプロイ

  deploy-app: # アプリ（Laravel）をEC2にデプロイするジョブ
    runs-on: ubuntu-latest
    needs: [changes, validate, deploy-infra] # 検証と必要なインフラ更新が終わってから実行
    if: env.AWS_DEPLOY_PAUSED != 'true' && always() && !failure() # deploy-infraがスキップされた場合も実行するが、失敗した場合は実行しない

    steps:
      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/checkout@v4

      - name: CDK Output取得
        id: stack
        run: |
          outputs=$(aws cloudformation describe-stacks \
            --stack-name GuideStack \
            --query 'Stacks[0].Outputs' \
            --output json)

          get_output() {
            echo "$outputs" | jq -r ".[] | select(.OutputKey == \"$1\") | .OutputValue"
          }

          {
            echo "cloudfront_url=$(get_output CloudFrontUrl)"
            echo "database_endpoint=$(get_output DatabaseEndpoint)"
            echo "database_secret_arn=$(get_output DatabaseSecretArn)"
            echo "files_bucket_name=$(get_output FilesBucketName)"
            echo "app_key_secret_arn=$(get_output AppKeySecretArn)"
            echo "app_repository_uri=$(get_output AppRepositoryUri)"
          } >> "$GITHUB_OUTPUT"

      - name: QEMUセットアップ
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildxセットアップ
        uses: docker/setup-buildx-action@v3

      - name: ECRログイン
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker imageをECRへpush
        id: image
        run: |
          image_uri="${{ steps.stack.outputs.app_repository_uri }}:${GITHUB_SHA}"
          docker buildx build \
            --platform linux/arm64 \
            --tag "$image_uri" \
            --push \
            .
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: SSM経由でASGへデプロイ
        run: |
          cat > /tmp/guide-deploy.sh <<'REMOTE_SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          app_dir=/home/ubuntu/guide

          mkdir -p "$app_dir"
          cd "$app_dir"

          db_secret=$(aws secretsmanager get-secret-value \
            --secret-id "__DATABASE_SECRET_ARN__" \
            --query SecretString \
            --output text)
          db_username=$(echo "$db_secret" | jq -r '.username')
          db_password=$(echo "$db_secret" | jq -r '.password')
          app_key=$(aws secretsmanager get-secret-value \
            --secret-id "__APP_KEY_SECRET_ARN__" \
            --query SecretString \
            --output text)

          cat > production.env <<ENV
          APP_NAME=Guide
          APP_ENV=production
          APP_KEY=${app_key}
          APP_DEBUG=false
          APP_URL=__CLOUDFRONT_URL__
          LOG_CHANNEL=stderr
          LOG_LEVEL=info
          DB_CONNECTION=pgsql
          DB_HOST=__DATABASE_ENDPOINT__
          DB_PORT=5432
          DB_DATABASE=guide
          DB_USERNAME=${db_username}
          DB_PASSWORD=${db_password}
          SESSION_DRIVER=database
          SESSION_SECURE_COOKIE=true
          CACHE_STORE=database
          QUEUE_CONNECTION=database
          FILESYSTEM_DISK=s3
          FILESYSTEM_UPLOADS_DISK=s3
          AWS_DEFAULT_REGION=__AWS_REGION__
          AWS_BUCKET=__FILES_BUCKET_NAME__
          AWS_USE_PATH_STYLE_ENDPOINT=false
          MAIL_MAILER=log
          ENV
          chown ubuntu:ubuntu production.env

          cat > docker-compose.prod.yml <<'COMPOSE'
          services:
            app:
              image: '${IMAGE_URI:?IMAGE_URI is required}'
              env_file:
                - production.env
              ports:
                - '80:80'
              healthcheck:
                test: ['CMD-SHELL', 'curl --fail --silent http://127.0.0.1/up || exit 1']
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 10s
              restart: unless-stopped
          COMPOSE
          chown ubuntu:ubuntu docker-compose.prod.yml

          IMAGE_URI="__IMAGE_URI__"
          registry="${IMAGE_URI%/*}"
          aws ecr get-login-password --region "__AWS_REGION__" \
            | sudo -u ubuntu docker login --username AWS --password-stdin "$registry"

          sudo -u ubuntu env IMAGE_URI="__IMAGE_URI__" docker compose -f docker-compose.prod.yml pull
          sudo -u ubuntu env IMAGE_URI="__IMAGE_URI__" docker compose -f docker-compose.prod.yml up -d --remove-orphans

          for _ in $(seq 1 60); do
            if sudo -u ubuntu env IMAGE_URI="__IMAGE_URI__" docker compose -f docker-compose.prod.yml exec -T app php -v > /dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          sudo -u ubuntu env IMAGE_URI="__IMAGE_URI__" docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force --isolated
          sudo -u ubuntu env IMAGE_URI="__IMAGE_URI__" docker compose -f docker-compose.prod.yml exec -T app php artisan optimize

          curl --fail --silent --show-error --retry 30 --retry-delay 5 --retry-all-errors http://127.0.0.1/up > /dev/null
          REMOTE_SCRIPT

          sed -i \
            -e 's#__CLOUDFRONT_URL__#${{ steps.stack.outputs.cloudfront_url }}#g' \
            -e 's#__DATABASE_ENDPOINT__#${{ steps.stack.outputs.database_endpoint }}#g' \
            -e 's#__DATABASE_SECRET_ARN__#${{ steps.stack.outputs.database_secret_arn }}#g' \
            -e 's#__FILES_BUCKET_NAME__#${{ steps.stack.outputs.files_bucket_name }}#g' \
            -e 's#__APP_KEY_SECRET_ARN__#${{ steps.stack.outputs.app_key_secret_arn }}#g' \
            -e 's#__AWS_REGION__#${{ secrets.AWS_REGION }}#g' \
            -e 's#__IMAGE_URI__#${{ steps.image.outputs.image_uri }}#g' \
            /tmp/guide-deploy.sh

          ssm_params=$(jq -n --rawfile script /tmp/guide-deploy.sh '{commands: [$script]}')
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:GuideRole,Values=app" \
            --document-name "AWS-RunShellScript" \
            --parameters "$ssm_params" \
            --comment "Deploy Guide app" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for attempt in {1..90}; do
            statuses=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query 'CommandInvocations[].Status' \
              --output text)

            if [ -z "$statuses" ]; then
              sleep 10
              continue
            fi

            if echo "$statuses" | grep -Eq 'Failed|Cancelled|TimedOut|Cancelling'; then
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --details \
                --output text
              exit 1
            fi

            if ! echo "$statuses" | grep -Eq 'Pending|InProgress|Delayed'; then
              break
            fi

            sleep 10
          done

          aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details \
            --output text
