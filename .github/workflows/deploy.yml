name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    # infra/ に変更があった時だけ実行
    if: |
      contains(join(github.event.commits.*.modified, ','), 'infra/') ||
      contains(join(github.event.commits.*.added, ','), 'infra/')

    steps:
      - uses: actions/checkout@v4

      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: 依存パッケージインストール
        run: cd infra && npm ci

      - name: CDK差分確認（ログのみ）
        run: cd infra && npx cdk diff
        continue-on-error: true

      - name: CDKデプロイ
        run: cd infra && npx cdk deploy --require-approval never

  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra
    # deploy-infra がスキップされた場合も実行する
    if: always()

    steps:
      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SSM経由でデプロイ
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo -u ubuntu -i bash -c \"set -e && cd /home/ubuntu/guide && git reset --hard HEAD && git pull origin main && docker compose -f docker-compose.prod.yml up -d --build && docker compose -f docker-compose.prod.yml exec -T app composer install --no-dev --optimize-autoloader && docker compose -f docker-compose.prod.yml exec -T app bash -c '"'"'npm ci && npm run build'"'"' && docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force && docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache && docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache && docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # 完了まで待機（最大10分）
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # 結果を表示
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text
