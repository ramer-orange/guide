services:
  - type: web
    name: guide
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: PLAGINE
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: ja
      - key: APP_FALLBACK_LOCALE
        value: ja
      - key: APP_FAKER_LOCALE
        value: ja_JP
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: guide-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: log

databases:
  - name: guide-db
    plan: free
